name: civic_connect 
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  path: ^1.9.1
  dio: ^5.9.2
  dio_smart_retry: ^7.0.1
  connectivity_plus: ^7.1.1
  flutter_secure_storage: ^10.3.0
  shared_preferences: ^2.5.5
  jwt_decoder: ^2.0.1
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.0.0
  flutter_image_compress: ^2.4.0
  video_compress: ^3.1.4
  image_picker: ^1.2.2
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  video_thumbnail: ^0.5.6
  flutter_svg: ^2.3.0
  web_socket_channel: ^3.0.3
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  uuid: ^4.5.3
  intl: ^0.20.2
  workmanager: ^0.9.0+3
  permission_handler: ^12.0.1
  equatable: ^2.0.8
  dartz: ^0.10.1
  flutter_ripple: ^0.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ">=2.4.13 <2.9.0"
  json_serializable: ">=6.8.0 <6.13.1"
  hive_generator: ^2.0.1
  mocktail: ^1.0.3
  fake_async: ^1.3.1

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

  # Directories are commented out until you have files inside them.
  # Once you add files (e.g., logo.png), uncomment the line.
  assets:
  
    # - assets/icons/
    # - assets/images/
    # - assets/svg/